<!doctype html>
<html>
  <head>
    <title>Flexbox Pricing Table</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      .plan-button{
        background-color:#facc15;

      }
      #Basic {
        color: #d1d5db;
      }

      #Standard {
        color: #8b5cf6;
      }

      #Premium {
        color: #f59e0b;
      }
      .img {
        width: 100%;
        height: 150px;
        border-radius: 7%;
      }

      body {
        font-family: "Sono", sans-serif;
        background: linear-gradient(
          135deg,
          #270154 0%,
          #1b013b 50%,
          #0a0018 100%
        );
      }
      h1 {
        margin-top: 30px;
        margin-bottom: 10px;
        text-align: center;
        font-size: 50px;
        color: #facc15;
      }
      p {
        text-align: center;
        margin-bottom: 10px;
        margin-top: 10px;
        font-size: 25px;
        color: #d1d5db;
      }

      .pricing-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        gap: 2rem;
      }

      .pricing-plan {
        flex: 1;
        max-width: 250px;
        text-align: center;
        border-radius: 14%;
        background-color: #47009c;
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }
      .pricing-plan:hover {
        transform: scale(1.1);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      }

      .plan-title {
        font-size: 10px;
        color: beige;
      }

      .plan-price {
        font-size: 25px;
        font: bolder;
      }

      /* Hint: What can you do with a media query and flexbox? */
      @media (max-width: 1250px) {
        .pricing-container {
          flex-direction: column;
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <h1>Start Your Journey Today</h1>
    <p>Flexible plans for individuals and teams.</p>
    <div class="pricing-container">
      <div class="pricing-plan">
        <img class="img" src="./assets/basic.jpg" alt="basic" />
        <div id="Basic" class="plan-title">Basic</div>
        <div class="plan-price">$9.99/month</div>
        <ul class="plan-features">
          <li>✅ 10GB Storage</li>
          <li>✅ 1 User</li>
          <li>🚫 Support</li>
        </ul>
        <button class="plan-button">Sign Up</button>
      </div>
      <div class="pricing-plan">
        <img class="img" src="./assets/standard.jpg" alt="standard" />
        <div id="Standard" class="plan-title">Standard</div>
        <div class="plan-price">$19.99/month</div>
        <ul class="plan-features">
          <li>✅ 50GB Storage</li>
          <li>✅ 5 Users</li>
          <li>✅ Phone &amp; Email Support</li>
        </ul>
        <button class="plan-button">Sign Up</button>
      </div>
      <div class="pricing-plan">
        <img class="img" src="./assets/premium.jpg" alt="premium" />
        <div id="Premium" class="plan-title">Premium</div>
        <div class="plan-price">$49.99/month</div>
        <ul class="plan-features">
          <li>✅ 100GB Storage</li>
          <li>✅ 10 Users</li>
          <li>✅ 24/7 Support</li>
        </ul>
        <button class="plan-button">Sign Up</button>
      </div>
    </div>
  </body>
</html>
